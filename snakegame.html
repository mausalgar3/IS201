<!DOCTYPE html>
<html>
<head>
  <title>Simple Snake Game</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #070968; color: white; font-family: sans-serif; flex-direction: column; }
    canvas { border: 5px solid #fff; background: #000; box-shadow: 0 0 20px rgba(0, 8, 116, 0.5); }
    h1 { margin-bottom: 10px; }
  </style>
</head>
<body>

  <h1>Snake Score: <span id="score">0</span></h1>
  <canvas id="snakeGame" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("snakeGame");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    let box = 20; // Size of one square
    let score = 0;
    let snake = [{ x: 9 * box, y: 10 * box }]; // Initial snake position
    let food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
    let d; // Direction

    document.addEventListener("keydown", direction);

    function direction(event) {
      if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
      else if(event.keyCode == 38 && d != "DOWN") d = "UP";
      else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
      else if(event.keyCode == 40 && d != "UP") d = "DOWN";
    }

    function draw() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

    //   for(let i = 0; i < snake.length; i++) {
    //     ctx.fillStyle = (i == 0) ? "green" : "lime";
    //     ctx.fillRect(snake[i].x, snake[i].y, box, box);
    //     ctx.strokeStyle = "black";
    //     ctx.strokeRect(snake[i].x, snake[i].y, box, box);
    //   }

    for(let i = 0; i < snake.length; i++) {
  // Use the remainder (index % 3) to cycle colors: 0=Red, 1=White, 2=Blue
  if (i % 3 === 0) {
    ctx.fillStyle = "red"; // Texas Red
  } else if (i % 3 === 1) {
    ctx.fillStyle = "#FFFFFF"; // White
  } else {
    ctx.fillStyle = "#002868"; // Texas Blue
  }

  ctx.fillRect(snake[i].x, snake[i].y, box, box);
  
  // Add a slight border to each segment so you can see the individual blocks
  ctx.strokeStyle = "#333";
  ctx.strokeRect(snake[i].x, snake[i].y, box, box);
}

      ctx.fillStyle = "green";
      ctx.fillRect(food.x, food.y, box, box);

      let snakeX = snake[0].x;
      let snakeY = snake[0].y;

      if( d == "LEFT") snakeX -= box;
      if( d == "UP") snakeY -= box;
      if( d == "RIGHT") snakeX += box;
      if( d == "DOWN") snakeY += box;

      // Check if snake eats food
      if(snakeX == food.x && snakeY == food.y) {
        score++;
        scoreElement.innerHTML = score;
        food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
      } else {
        snake.pop(); // Remove tail
      }

      let newHead = { x: snakeX, y: snakeY };

      // Game Over conditions
      if(snakeX < 0 || snakeY < 0 || snakeX >= canvas.width || snakeY >= canvas.height || collision(newHead, snake)) {
        clearInterval(game);
        alert("Game Over! Final Score: " + score);
        location.reload(); // Restart game
      }

      snake.unshift(newHead); // Add new head
    }

    function collision(head, array) {
      for(let i = 0; i < array.length; i++) {
        if(head.x == array[i].x && head.y == array[i].y) return true;
      }
      return false;
    }

    let game = setInterval(draw, 100); // Run draw function every 100ms
  </script>
</body>
</html>
